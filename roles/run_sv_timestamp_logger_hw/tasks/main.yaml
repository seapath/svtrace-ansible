---
- name: set platform
  set_fact:
    target_architecture: "{{ hostvars[inventory_hostname]['target_platform'] | default(target_platform) }}"

- name: Stop hardware sv_timestamp_logger container
  become: true
  docker_container:
    name: sv_timestamp_logger_hw_{{ target_architecture }}
    state: absent

- name: Run hardware-timestamping SV timestamp logger container
  become: true
  docker_container:
    name: sv_timestamp_logger_hw_{{ target_architecture }}
    image: localhost/sv_timestamp_logger_{{ target_architecture }}
    state: started
    detach: true
    privileged: true
    cpuset_cpus: "{{ hw_ts_core if (hw_ts_core is defined and not hw_ts_core is none) else omit }}"
    volumes:
      - "{{ ansible_user_dir }}/latency_tests:/tmp/latency_tests"
    devices:
      - "/dev/ptp0:/dev/ptp0"
    network_mode: host
    capabilities:
      - NET_ADMIN
      - SYS_NICE
    command: >
      -d {{ sv_interface }}
      -f "/tmp/latency_tests/ts_hw_{{ inventory_hostname }}.txt"
      -s {{ stream_to_log }}
      -t

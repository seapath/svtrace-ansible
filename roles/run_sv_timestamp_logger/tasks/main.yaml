---
- name: set platform
  set_fact:
    target_architecture: "{{ hostvars[inventory_hostname]['target_platform'] | default(target_platform) }}"
- name: Stop sv_timestamp_logger container
  become: true
  docker_container:
    name: sv_timestamp_logger_{{ target_architecture }}
    state: absent

- name: Run SV timestamp logger container
  become: true
  docker_container:
    name: sv_timestamp_logger_{{ target_architecture }}
    image: localhost/sv_timestamp_logger_{{ target_architecture }}
    state: started
    detach: true
    privileged: true
    cpuset_cpus: "{{ sv_ts_core if (sv_ts_core is defined and not sv_ts_core is none) else omit }}"
    volumes:
      - "{{ ansible_user_dir }}/latency_tests:/tmp/latency_tests"
    devices: "{{ [clock_device ~ ':' ~ clock_device] if (clock_device is defined and clock_device | length > 0) else omit }}"
    network_mode: host
    capabilities:
      - NET_ADMIN
      - SYS_NICE
    command: >
      -d {{ sv_interface }}
      -f "/tmp/latency_tests/ts_{{ inventory_hostname }}.txt"
      -s {{ stream_to_log }}
      {% if 'publisher' in group_names %}
      -t
      {% endif %}
      {{ ('--clock_device ' ~ clock_device) if (clock_device is defined and clock_device | length > 0) else '' }}
  when: enable_sv_ts is defined and enable_sv_ts|bool == true

---
all:
  children:
    standalone_machine:
      children:
        publisher:
          hosts:
            build_pc:
              ansible_host: ""  # TODO -- Build PC Admin IP
              ansible_user: root
              ansible_become: false

              sv_interface: "" # TODO -- Build PC SV ethernet interface name

              # .pcap file is provided for this lab
              pcap_file: "8_streams_4000_SV.pcap"   # 1s of SV
              pcap_path: "/home/seapath/seapath/labs/"

              pcap_loop: 10       # Number of time the pcap_file file is played

              # The build PC NIC has no hardware PTP support, so it is no
              # longer used as the SV reference. It only sends bittwist.
              enable_sv_ts: false
              bittwist_core: 1    # CPU running bittwist

        subscriber:
          hosts:
            vm:
              ansible_host: ""  # TODO -- VM Admin IP
              ansible_user: admin

              sv_interface: ""  # TODO -- VM SV ethernet interface name
              enable_sv_ts: true
              sv_ts_core: 1
              stream_to_log: 0
              first_SV: 0

              # Read userspace timestamps from the NIC PHC instead of
              # CLOCK_REALTIME so they share the same clock domain as the
              # hardware-timestamped reference logger.
              clock_device: "/dev/ptp0"

        reference_logger:
          hosts:
            vm:
              # The reference (hardware-timestamped) logger runs on the VM
              # itself, on a CPU distinct from the subscriber logger.
              hw_ts_core: 2

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_connection: ssh
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_remote_tmp: /tmp/.ansible/tmp
